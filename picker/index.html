:root{--brown:#382b26;--gold:#edcc61;--ink:#f2e7cf}

header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,#3a2c25,#2a2018);

.wrap{max-width:1280px;margin:0 auto;padding:1rem 1.2rem 6rem}

.venue.collapsed .grid,.venue.collapsed .vbtns{display:none}

.vhead .nm{font-size:1.1rem;font-weight:600}

.tag{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:.12rem .5rem;border-radius:99px;border:1px solid}
.tag.out{color:#e98b7d;border-color:#c0392b66}
.tag.cur{color:#bdae8e;border-color:rgba(237,204,97,.25)}
.tag.sel{background:var(--gold);color:var(--brown);border-color:var(--gold);font-weight:700}
.caret{margin-left:auto;color:#bdae8e;font-size:1.1rem}
.vbtns{display:flex;gap:.5rem;margin:.8rem 0 .2rem;flex-wrap:wrap;align-items:center}
button{font:inherit;cursor:pointer;border-radius:8px;border:1px solid rgba(237,204,97,.4);

button:hover{border-color:var(--gold)}
button.mini{font-size:.76rem;padding:.3rem .6rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.55rem;margin-top:.7rem}
.th{position:relative;aspect-ratio:4/3;border-radius:7px;overflow:hidden;cursor:pointer;
  background:#1c150f;border:2px solid transparent;transition:.15s}
.th img{width:100%;height:100%;object-fit:cover;display:block}
.th.broken{display:none}
.th.sel{border-color:var(--gold);box-shadow:0 0 0 2px rgba(237,204,97,.35)}
.th .ord{position:absolute;top:4px;left:4px;min-width:22px;height:22px;padding:0 5px;border-radius:11px;
  background:var(--gold);color:var(--brown);font-size:.72rem;font-weight:800;display:none;
  align-items:center;justify-content:center}
.th.sel .ord{display:flex}
.th .chk{position:absolute;inset:0;background:rgba(56,43,38,.30);opacity:0;transition:.15s}
.th.sel .chk{opacity:1}
footer{position:fixed;left:0;right:0;bottom:0;z-index:6;background:linear-gradient(0deg,#3a2c25,#2e231c);
  border-top:1px solid rgba(237,204,97,.35);padding:.7rem 1.2rem;display:flex;gap:.7rem;align-items:center;flex-wrap:wrap}
footer .sum{font-size:.85rem}.footer b{color:var(--gold)}
button.go{background:var(--gold);color:var(--brown);border-color:var(--gold);font-weight:700}
#toast{position:fixed;left:50%;bottom:4.6rem;transform:translateX(-50%) translateY(10px);
  background:var(--gold);color:var(--brown);font-weight:700;padding:.55rem 1.1rem;border-radius:99px;
  opacity:0;transition:.3s;z-index:9;box-shadow:0 8px 30px rgba(0,0,0,.4)}
#toast.show{opacity:1;transform:translateX(-50%)}

const KEY = 'ajwa.picker.sel.v1';
const sel = JSON.parse(localStorage.getItem(KEY) || '{}');   // slug -> [id,...]
const $ = s => document.querySelector(s);
function persist(){localStorage.setItem(KEY, JSON.stringify(sel));}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
function totalSel(){return Object.values(sel).reduce((a,b)=>a+b.length,0);}
function venuesWith(){return Object.keys(sel).filter(k=>sel[k]&&sel[k].length).length;}
function updSum(){$('#sum').innerHTML='Seçili: <b>'+totalSel()+'</b> foto · <b>'+venuesWith()+'</b> mekan';}

function card(v){
  if(!sel[v.slug]) sel[v.slug]=[];
  const c=document.createElement('div');c.className='venue collapsed';c.dataset.slug=v.slug;
  c.innerHTML=
   '<div class="vhead">'+
     '<span class="nm">'+v.name+'</span>'+
     (v.outside?'<span class="tag out">Kullanım Harici</span>':'')+
     '<span class="tag cur">şu an: '+v.current+'</span>'+
     '<span class="tag sel" data-sel>seçili: '+sel[v.slug].length+'</span>'+
     '<span class="meta">'+v.ids.length+' foto mevcut</span>'+
     '<span class="caret">▸</span></div>'+
   '<div class="vbtns">'+
     '<button class="mini" data-all>Tümünü seç</button>'+
     '<button class="mini" data-clear>Temizle</button></div>'+
   '<div class="grid"></div>';
  const grid=c.querySelector('.grid');
  v.ids.forEach(id=>{
    const th=document.createElement('div');th.className='th';th.dataset.id=id;
    const img=new Image();img.loading='lazy';img.src='https://lh3.googleusercontent.com/d/'+id+'=w300';
    img.onerror=()=>th.classList.add('broken');
    const chk=document.createElement('span');chk.className='chk';
    const ord=document.createElement('span');ord.className='ord';
    th.appendChild(chk);th.appendChild(ord);th.appendChild(img);
    th.addEventListener('click',()=>{const a=sel[v.slug];const i=a.indexOf(id);
      if(i>=0)a.splice(i,1);else a.push(id);persist();refresh(c,v.slug);updSum();});
    grid.appendChild(th);
  });
  c.querySelector('.vhead').addEventListener('click',()=>{c.classList.toggle('collapsed');
    c.querySelector('.caret').textContent=c.classList.contains('collapsed')?'▸':'▾';});
  c.querySelector('[data-all]').addEventListener('click',e=>{e.stopPropagation();
    sel[v.slug]=v.ids.filter(id=>!grid.querySelector('.th[data-id="'+CSS.escape(id)+'"]').classList.contains('broken'));
    persist();refresh(c,v.slug);updSum();});
  c.querySelector('[data-clear]').addEventListener('click',e=>{e.stopPropagation();
    sel[v.slug]=[];persist();refresh(c,v.slug);updSum();});
  refresh(c,v.slug);
  return c;
}
function refresh(c,slug){
  const a=sel[slug]||[];
  c.querySelectorAll('.th').forEach(th=>{const k=a.indexOf(th.dataset.id);
    th.classList.toggle('sel',k>=0);th.querySelector('.ord').textContent=k>=0?(k+1):'';});
  c.querySelector('[data-sel]').textContent='seçili: '+a.length;
}
function exportObj(){const o={};Object.keys(sel).forEach(k=>{if(sel[k]&&sel[k].length)o[k]=sel[k];});return o;}
$('#dl').addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify(exportObj(),null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='selection.json';a.click();
  toast('selection.json indirildi');
});
$('#copy').addEventListener('click',async()=>{
  try{await navigator.clipboard.writeText(JSON.stringify(exportObj(),null,2));toast('Panoya kopyalandı');}
  catch(e){toast('Kopyalanamadı, “İndir”i kullanın');}
});
$('#reset').addEventListener('click',()=>{if(confirm('Tüm seçimler silinsin mi?')){
  Object.keys(sel).forEach(k=>delete sel[k]);persist();location.reload();}});
const wrap=$('#wrap');DATA.venues.forEach(v=>wrap.appendChild(card(v)));updSum();
</script></body></html>
